<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Minimal Store – Product Page</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  
  <style>
    :root {
      --primary: #6366f1;       /* indigo */
      --primary-dark: #4f46e5;
      --dark: #0f172a;
      --dark-2: #1e293b;
      --light: #f8fafc;
      --gray: #64748b;
      --gray-light: #cbd5e1;
      --radius: 16px;
      --shadow-sm: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-md: 0 10px 25px rgba(0,0,0,0.12);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--light);
      color: var(--dark);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ================== HEADER ================== */
    header {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(226,232,240,0.8);
      z-index: 1000;
      padding: 1rem 5%;
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -1px;
    }

    .nav-right {
      display: flex;
      gap: 1.8rem;
      align-items: center;
    }

    .cart-icon {
      font-size: 1.4rem;
      color: var(--dark);
      position: relative;
      cursor: pointer;
    }

    .cart-count {
      position: absolute;
      top: -8px;
      right: -8px;
      background: var(--primary);
      color: white;
      font-size: 0.68rem;
      font-weight: bold;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: grid;
      place-items: center;
    }

    /* ================== MAIN PRODUCT ================== */
    .product-container {
      max-width: 1200px;
      margin: 3rem auto;
      padding: 0 5%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
    }

    .product-gallery {
      position: relative;
    }

    .main-image {
      width: 100%;
      height: auto;
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      object-fit: cover;
      background: white;
    }

    .color-options {
      display: flex;
      gap: 0.8rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }

    .color-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 0 0 2px #e2e8f0;
      cursor: pointer;
      transition: all 0.2s;
    }

    .color-btn.active,
    .color-btn:hover {
      box-shadow: 0 0 0 3px var(--primary);
      transform: scale(1.12);
    }

    /* Right side - Info */
    .product-info h1 {
      font-size: 2.6rem;
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    .price {
      font-size: 2.1rem;
      font-weight: 700;
      color: var(--primary-dark);
      margin: 1.2rem 0 1.8rem;
    }

    .price del {
      color: var(--gray);
      font-size: 1.4rem;
      font-weight: 500;
      margin-left: 1rem;
    }

    .description {
      color: var(--gray);
      margin: 1.8rem 0 2rem;
      font-size: 1.05rem;
    }

    .size-selector {
      margin: 1.8rem 0;
    }

    .size-selector h3 {
      margin-bottom: 0.9rem;
      font-size: 1.05rem;
    }

    .sizes {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .size-btn {
      padding: 0.6rem 1.2rem;
      border: 1px solid var(--gray-light);
      border-radius: 10px;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
    }

    .size-btn:hover,
    .size-btn.active {
      border-color: var(--primary);
      background: var(--primary);
      color: white;
    }

    /* CTA */
    .actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin: 2.5rem 0 3rem;
    }

    .btn {
      padding: 1rem 2.2rem;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.25s;
      border: none;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--dark);
      color: var(--dark);
    }

    .btn-outline:hover {
      background: var(--dark);
      color: white;
    }

    /* Mobile */
    @media (max-width: 900px) {
      .product-container {
        grid-template-columns: 1fr;
        gap: 3rem;
      }
      
      .product-info h1 {
        font-size: 2.2rem;
      }
      
      .price {
        font-size: 1.9rem;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="nav-container">
    <div class="logo">Minimal</div>
    <div class="nav-right">
      <a href="#" class="cart-icon">
        <i class="fa-solid fa-bag-shopping"></i>
        <span class="cart-count">3</span>
      </a>
    </div>
  </div>
</header>

<main class="product-container">

  <div class="product-gallery">
    <img src="https://images.unsplash.com/photo-1620799140401-edc9c3b8a2d2?w=900&auto=format&fit=crop&q=80" 
         alt="Product" class="main-image" id="mainImage"/>
    
    <div class="color-options">
      <div class="color-btn" style="background:#000"></div>
      <div class="color-btn active" style="background:#4f46e5"></div>
      <div class="color-btn" style="background:#ef4444"></div>
      <div class="color-btn" style="background:#eab308"></div>
      <div class="color-btn" style="background:#10b981"></div>
    </div>
  </div>

  <div class="product-info">

    <h1>Ultra Cotton Oversized Tee</h1>
    
    <div class="price">
      ₹1,899 <del>₹2,499</del>
    </div>

    <div class="description">
      Premium 280 GSM 100% combed cotton oversized fit t-shirt with bio-washed & pre-shrunk fabric. 
      Dropped shoulders, wide neck rib, super comfortable & street-style approved.
    </div>

    <div class="size-selector">
      <h3>Select Size</h3>
      <div class="sizes">
        <button class="size-btn active">S</button>
        <button class="size-btn">M</button>
        <button class="size-btn">L</button>
        <button class="size-btn">XL</button>
        <button class="size-btn">XXL</button>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary">
        <i class="fa-solid fa-cart-plus"></i> Add to Cart
      </button>
      <button class="btn btn-outline">Buy Now</button>
    </div>

  </div>

</main>

</body>
</html>
